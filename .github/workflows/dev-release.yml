# .github/workflows/dev-release.yml
name: Create Dev Release

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to write releases
    steps:
      - name: Checkout
        # fetch-depth: 0 already retrieves all tags (the fetch refspec
        # includes +refs/tags/*), which GoReleaser needs for the changelog.
        # release.yml relies on this same checkout with no extra tag fetch.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.5'
          cache: false

      # Populate the build metadata consumed by .goreleaser.dev.yaml
      # ({{.Env.BUILD_DATE}}). Without this the value was empty (these env keys
      # were referenced below but never defined).
      - name: Set build environment variables
        run: |
          echo "BUILD_DATE=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "GO_VERSION=$(go version)" >> "$GITHUB_ENV"

      - name: Run GoReleaser for Dev
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # Pinned to match the release workflow and keep dev builds reproducible.
          version: '2.15.4'
          args: release --config .goreleaser.dev.yaml --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_USER: "${{ github.actor }}"
          BUILD_DATE: ${{ env.BUILD_DATE }}
          GO_VERSION: ${{ env.GO_VERSION }}
          BRANCH_NAME: ${{ github.ref_name }}
          REVISION: ${{ github.sha }}
