# golangci-lint configuration for slurm_exporter
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # --- Correctness ---
    - errcheck       # Unchecked errors (silent failures from strconv, io, etc.)
    - govet          # Reports suspicious constructs (shadow, printf misuse, etc.)
    - staticcheck    # Comprehensive static analysis (supersedes gosimple, stylecheck, unused)
    - ineffassign    # Detects assignments whose value is never used

    # --- Security ---
    - gosec          # Security checks (G103 unsafe, G304 file inclusion, G401 weak crypto, etc.)

    # --- Bugs / robustness ---
    - bodyclose      # HTTP response body must be closed
    - noctx          # HTTP requests must use context

    # --- Style / maintainability ---
    - revive         # Extensible replacement for golint
    - gocritic       # Opinionated checks (including rangeValCopy, captLocal, etc.)
    - misspell       # Spelling mistakes in comments and strings
    - whitespace     # Unnecessary blank lines


  settings:
    gosec:
      # G304 (file path from variable) is expected in test helpers that read fixture files
      excludes:
        - G304

    revive:
      rules:
        - name: indent-error-flow
        # var-naming (snake_case -> camelCase) and exported (godoc comments) are excluded
        # because the entire codebase uses this pre-existing style — fixing it requires a
        # dedicated renaming pass touching every file. Track as separate issue.

    gocritic:
      enabled-checks:
        # captLocal, commentFormatting, singleCaseSwitch, appendAssign are already
        # enabled by default — only list non-default checks here.
        - rangeValCopy

    staticcheck:
      checks:
        - all
        # ST1003 (naming conventions) and ST1000/ST1020 (package/godoc comments) are
        # pre-existing style throughout the codebase — fixing requires a dedicated pass.
        - "-ST1003"
        - "-ST1000"
        - "-ST1020"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/sckyzo/slurm_exporter

issues:
  # Increase limits for generated/test files
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files: relax errcheck (io.ReadAll error is acceptable in tests)
    - path: "_test\\.go"
      linters:
        - errcheck
        - gosec

    # revive: var-naming and exported godoc comments are pre-existing style throughout
    # the codebase — fixing requires a dedicated renaming pass (separate issue).
    - linters: [revive]
      text: "(var-naming|exported)"
