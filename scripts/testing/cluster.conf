# =============================================================================
# cluster.conf — Slurm test cluster configuration
#
# Compatible with both Make (include) and bash (source).
# Override locally: create cluster.local.conf (gitignored).
# =============================================================================

# ── Cluster ───────────────────────────────────────────────────────────────────

# Path to a local clone of https://github.com/giovtorres/slurm-docker-cluster
# Leave empty for auto-detection.
CLUSTER_DIR=

# Slurm version (must match an available Docker Hub tag: 25.11.2, 25.05.6, ...)
SLURM_VERSION=25.11.2

# Number of CPU compute nodes
NODES=10

# ── Monitoring ────────────────────────────────────────────────────────────────

GRAFANA_URL=http://localhost:3000
GRAFANA_USER=admin
GRAFANA_PASS=admin

# ── Slurm Accounts ────────────────────────────────────────────────────────────
# Space-separated, format: NAME:DESCRIPTION:ORGANIZATION
ACCOUNTS="hpc_team:HPC-Team:lab ml_group:ML-Group:lab physics:Physics-Dept:lab bio:Bioinformatics:lab"

# ── Users ─────────────────────────────────────────────────────────────────────
# Space-separated, format: NAME:UID:DEFAULT_ACCOUNT
# UIDs must be unique and consistent across all containers.
USERS="alice:1000:hpc_team bob:1001:ml_group carol:1002:physics dave:1003:bio eve:1004:ml_group frank:1005:hpc_team"

# ── Extra Partitions ──────────────────────────────────────────────────────────
# Space-separated, format: NAME:NODES:MAXTIME_MIN:PRIORITY:DEFAULT
# MAXTIME_MIN=0 means INFINITE. DEFAULT: YES or NO.
PARTITIONS="debug:c[1-2]:30:1:NO high:c[1-3]:0:100:NO"

# ── Playwright ────────────────────────────────────────────────────────────────

# Docker image + npm version must match (browser binaries bundled per image version)
PLAYWRIGHT_IMAGE=mcr.microsoft.com/playwright:v1.58.2-noble
PLAYWRIGHT_VERSION=1.58.2
